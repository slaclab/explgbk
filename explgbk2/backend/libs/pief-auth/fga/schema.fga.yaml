name: coact-authorization-model

# This is the GitHub model here, for reference:
# https://github.com/openfga/sample-stores/blob/main/stores/github/model.fga
# also can read more about it here:
# https://openfga.dev/docs/modeling/advanced/github

# model
#   schema 1.1

# type user

# type team
#   relations
#     define member: [user, team#member]

# type repo
#   relations
#     define admin: [user, team#member] or repo_admin from owner
#     define maintainer: [user, team#member] or admin
#     define owner: [organization]
#     define reader: [user, team#member] or triager or repo_reader from owner
#     define triager: [user, team#member] or writer
#     define writer: [user, team#member] or maintainer or repo_writer from owner

# type organization
#   relations
#     define member: [user] or owner
#     define owner: [user]
#     define repo_admin: [user, organization#member]
#     define repo_reader: [user, organization#member]
#     define repo_writer: [user, organization#member]

model: |
  model
    schema 1.1

  type user
  type agent

  type group # like teams in GitHub model
    relations
      define member: [user, group#member]

  type role
    relations
      define assignee: [user, group#member] 

  type system
    relations
      # admins could be individual users, or a group of users (e.g. "coact-admins")
      define admin: [user, group#member]

  type facility
    relations
      define parent_system: [system]
      define manager: [user] # like owner in github model
      define czar: manager
      define member: [user]
      # TODO: come back to service accounts
      # define service_account: [service_account]

      # admin-only operations (czars cannot do these):
      # 1. users (direct upsert, bypasses request flow — userUpsert)
      # 2. repos (direct create/upsert, bypasses request flow — repoCreate, repoUpsert, repoAppendMember)
      # 3. requests (raw creation, bypasses request flow — requestCreate)
      # 4. features (add/remove/update repo features)
      # 5. facility purchases (compute and storage budgets)
      # 6. data imports (jobs, storage usage)
      # 7. notifications (notificationSend)
      # 8. admin queries (requestsExistingForEPPN/User/Repo, reportFacilityComputeOverall)
      define admin: admin from parent_system

      # this encompasses managing:
      # 1. requests (approve, reject, complete, incomplete, refire, reopen, update facility)
      # 2. repos (update, rename, change principal, change compute requirement, manage allocations)
      # 3. users (user storage allocation upsert)
      # 4. czars (assigning/removing czars within this facility)
      # 5. facility metadata (description updates)
      # 6. audit trail (auditTrailAdd)
      define can_manage: czar or admin
      define can_view: member or can_manage

  type repo
    relations
      # roles
      define facility: [facility]
      define principal: [user]
      define leader: [user]
      define member: [user, group#member] 
      # this encompasses managing:
      # 1. users (adding/removing members, approving RepoMembership requests)
      # 2. roles (assigning/removing leaders)
      # 3. access groups (managing repo access groups)
      define manager: [group#member] or leader or principal or can_manage from facility
      define viewer: member or manager

  type experiment
    relations
      define repo: [repo]
      define principal: principal from repo
      define leader: leader from repo
      define user: [user, group#member] or member from repo

  type logbook
    relations
      define experiment: [experiment]

tuples:

    # System level
    - user: user:yee
      relation: admin
      object: system:coact

    # facility:lcls — czar, member, serviceaccount
    - user: system:coact
      relation: parent_system
      object: facility:lcls
    - user: user:wilko
      relation: czar
      object: facility:lcls
    - user: user:eve
      relation: member
      object: facility:lcls
    - user: user:dave
      relation: serviceaccount
      object: facility:lcls

    # facility:rubin — no czar assigned (used for isolation tests)
    - user: system:coact
      relation: parent_system
      object: facility:rubin

    # repo:lcls-project-1 — principal, leader, member
    - user: facility:lcls
      relation: facility
      object: repo:lcls-project-1
    - user: user:bob
      relation: principal
      object: repo:lcls-project-1
    - user: user:carol
      relation: leader
      object: repo:lcls-project-1
    - user: user:alice
      relation: member
      object: repo:lcls-project-1

    # repo:lcls-project-2 — separate repo in the same facility (isolation tests)
    - user: facility:lcls
      relation: facility
      object: repo:lcls-project-2
    - user: user:frank
      relation: principal
      object: repo:lcls-project-2

    # instrument:xpp — poc=sboutet, editor=xppopr
    - user: user:sboutet
      relation: poc
      object: instrument:xpp
    - user: user:xppopr
      relation: editor
      object: instrument:xpp

    # experiment:xpp101 — normal experiment
    # instrument tuple present so instrument roles propagate
    - user: instrument:xpp
      relation: instrument
      object: experiment:xpp101
    # repo:lcls-project-1 maps principal/leader/member to manager/editor/writer
    - user: repo:lcls-project-1
      relation: repo
      object: experiment:xpp101
    - user: user:public_reader
      relation: reader
      object: experiment:xpp101

    # experiment:restricted-exp — restricted experiment (no instrument tuple)
    # global instrument roles are blocked; repo-linked roles still apply
    - user: repo:lcls-project-1
      relation: repo
      object: experiment:restricted-exp
    - user: user:alice
      relation: writer
      object: experiment:restricted-exp

tests:

  # ── CoAct tests (unchanged) ──────────────────────────────────────────────

  - name: System admin (yee) can manage all facilities and repos
    check:
      - user: user:yee
        object: facility:lcls
        assertions:
          admin: true         # inherits via system:coact → parent_system
          can_manage: true
          can_view: true
      - user: user:yee
        object: repo:lcls-project-1
        assertions:
          principal: false
          leader: false
          member: false
          can_manage: true    # flows in via can_manage from facility
          can_view: true
      - user: user:yee
        object: facility:rubin
        assertions:
          admin: true         # system admin spans all facilities
          can_manage: true

  - name: Facility czar (wilko) can manage their facility and all repos in it
    check:
      - user: user:wilko
        object: facility:lcls
        assertions:
          czar: true
          admin: false
          can_manage: true
          can_view: true
      - user: user:wilko
        object: repo:lcls-project-1
        assertions:
          principal: false
          leader: false
          member: false
          can_manage: true    # flows in via can_manage from facility
          can_view: true
      - user: user:wilko
        object: repo:lcls-project-2
        assertions:
          can_manage: true    # czar manages all repos in their facility

  - name: Repo principal (bob) can manage their repo but not the facility
    check:
      - user: user:bob
        object: repo:lcls-project-1
        assertions:
          principal: true
          leader: false
          member: false
          can_manage: true
          can_view: true
      - user: user:bob
        object: facility:lcls
        assertions:
          czar: false
          can_manage: false    # principal does not get facility authority
          can_view: false
      - user: user:bob         # isolation: cannot manage a different repo
        object: repo:lcls-project-2
        assertions:
          principal: false
          can_manage: false
          can_view: false

  - name: Repo leader (carol) can manage their repo but not the facility
    check:
      - user: user:carol
        object: repo:lcls-project-1
        assertions:
          leader: true
          principal: false
          member: false
          can_manage: true
          can_view: true
      - user: user:carol
        object: facility:lcls
        assertions:
          czar: false
          can_manage: false   # leader does not get facility authority
          can_view: false
      - user: user:carol       # isolation: cannot manage a different repo
        object: repo:lcls-project-2
        assertions:
          leader: false
          can_manage: false
          can_view: false

  - name: Repo member (alice) can only view their repo
    check:
      - user: user:alice
        object: repo:lcls-project-1
        assertions:
          member: true
          principal: false
          leader: false
          can_manage: false
          can_view: true
      - user: user:alice
        object: facility:lcls
        assertions:
          can_manage: false
          can_view: false      # repo membership does not grant facility view
      - user: user:alice       # isolation: no access to another repo
        object: repo:lcls-project-2
        assertions:
          member: false
          can_view: false

  - name: Facility member (eve) can view the facility but not manage it
    check:
      - user: user:eve
        object: facility:lcls
        assertions:
          member: true
          czar: false
          can_manage: false
          can_view: true
      - user: user:eve         # facility membership does not grant repo access
        object: repo:lcls-project-1
        assertions:
          can_manage: false
          can_view: false

  - name: Service account (dave) has no implicit permissions
    check:
      - user: user:dave
        object: facility:lcls
        assertions:
          serviceaccount: true
          can_manage: false
          can_view: false     # serviceaccount is not wired into can_view
      - user: user:dave
        object: repo:lcls-project-1
        assertions:
          can_manage: false
          can_view: false

  - name: Facility czar isolation (wilko has no access to facility:rubin)
    check:
      - user: user:wilko
        object: facility:rubin
        assertions:
          czar: false
          can_manage: false
          can_view: false

  # ── CoAct repo → experiment role mapping ────────────────────────────────

  - name: Repo principal (bob) is experiment manager — full CRUD + manage_groups
    check:
      - user: user:bob
        object: experiment:xpp101
        assertions:
          manager: true
          editor: false
          writer: false
          reader: false
          can_read: true
          can_post: true
          can_edit: true
          can_delete: true
          can_manage_groups: true

  - name: Repo leader (carol) is experiment editor — CRUD but not manage_groups
    check:
      - user: user:carol
        object: experiment:xpp101
        assertions:
          editor: true
          manager: false
          writer: false
          reader: false
          can_read: true
          can_post: true
          can_edit: true
          can_delete: true
          can_manage_groups: false

  - name: Repo member (alice) is experiment writer — read + post only
    check:
      - user: user:alice
        object: experiment:xpp101
        assertions:
          writer: true
          editor: false
          manager: false
          reader: false
          can_read: true
          can_post: true
          can_edit: false
          can_delete: false
          can_manage_groups: false

  - name: Direct reader (public_reader) can only read
    check:
      - user: user:public_reader
        object: experiment:xpp101
        assertions:
          reader: true
          writer: false
          can_read: true
          can_post: false
          can_edit: false
          can_delete: false

  # ── Instrument-level role propagation ───────────────────────────────────

  - name: Instrument POC (sboutet) has full access including feedback on all xpp experiments
    check:
      - user: user:sboutet
        object: instrument:xpp
        assertions:
          poc: true
          editor: true    # poc implies editor
          manager: true   # poc implies manager
      - user: user:sboutet
        object: experiment:xpp101
        assertions:
          poc: true
          can_read: true
          can_post: true
          can_edit: true
          can_delete: true
          can_manage_groups: true
          can_feedback_read: true
          can_feedback_write: true

  - name: Instrument editor (xppopr) has CRUD but not manage_groups or feedback
    check:
      - user: user:xppopr
        object: instrument:xpp
        assertions:
          editor: true
          poc: false
      - user: user:xppopr
        object: experiment:xpp101
        assertions:
          editor: true
          poc: false
          can_read: true
          can_post: true
          can_edit: true
          can_delete: true
          can_manage_groups: false
          can_feedback_read: false
          can_feedback_write: false

  - name: Repo principal (frank) on lcls-project-2 has no access to xpp101
    check:
      - user: user:frank
        object: experiment:xpp101
        assertions:
          manager: false
          editor: false
          writer: false
          can_read: false
          can_post: false

  # ── Restricted experiment tests ──────────────────────────────────────────

  - name: Restricted experiment — instrument roles are blocked (no instrument tuple)
    check:
      - user: user:sboutet
        object: experiment:restricted-exp
        assertions:
          poc: false
          can_read: false
          can_edit: false
      - user: user:xppopr
        object: experiment:restricted-exp
        assertions:
          editor: false
          can_read: false

  - name: Restricted experiment — direct writer (alice) retains access
    check:
      - user: user:alice
        object: experiment:restricted-exp
        assertions:
          writer: true
          can_read: true
          can_post: true
          can_edit: false
          can_delete: false

  - name: Restricted experiment — CoAct repo roles still apply
    check:
      - user: user:bob
        object: experiment:restricted-exp
        assertions:
          manager: true
          can_read: true
          can_edit: true
          can_manage_groups: true
      - user: user:carol
        object: experiment:restricted-exp
        assertions:
          editor: true
          can_read: true
          can_edit: true
          can_manage_groups: false
