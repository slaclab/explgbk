include:
  - compose.mongo.yml

x-backend-env: &backend-env
  DOMAIN: ${DOMAIN}
  FRONTEND_HOST: ${FRONTEND_HOST?Variable not set}
  ENVIRONMENT: ${ENVIRONMENT}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
  SECRET_KEY: ${SECRET_KEY?Variable not set}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL}
  MONGODB_URI: mongodb://mongos:27017
  MONGODB_DB: ${MONGODB_DB}
  POSTGRES_SERVER: db
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER?Variable not set}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
  SENTRY_DSN: ${SENTRY_DSN}

x-streams-env: &streams-env
  POSTGRES_SERVER: db
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER?Variable not set}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  CDC_TOPIC: ${CDC_TOPIC:-elog-v1-cdc-raw}

services:

  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  dbgate:
    image: dbgate/dbgate:latest
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    environment:
      - CONNECTIONS=con1
      - LABEL_con1=postgres
      - SERVER_con1=db
      - PORT_con1=${POSTGRES_PORT:-5432}
      - USER_con1=${POSTGRES_USER}
      - PASSWORD_con1=${POSTGRES_PASSWORD}
      - DATABASE_con1=${POSTGRES_DB}
      - ENGINE_con1=postgres@dbgate-plugin-postgres
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-http.rule=Host(`dbgate.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-https.rule=Host(`dbgate.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-dbgate-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME?Variable not set}-dbgate.loadbalancer.server.port=3000

  mongo-express:
    image: mongo-express:latest
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      mongo-shard-init:
        condition: service_completed_successfully
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongos:27017/
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-http.rule=Host(`mongo-express.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-https.rule=Host(`mongo-express.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-mongo-express-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME?Variable not set}-mongo-express.loadbalancer.server.port=8081

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - traefik-public
      - default
    depends_on:
      mongo-shard-init:
        condition: service_completed_successfully
    command: bash /app/backend/scripts/prestart.sh
    env_file:
      - .env
    environment:
      <<: *backend-env

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      mongo-shard-init:
        condition: service_completed_successfully
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *backend-env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

    build:
      context: .
      dockerfile: backend/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.rule=Host(`api.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.middlewares=https-redirect

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - traefik-public
      - default
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=https://api.${DOMAIN?Variable not set}
        - NODE_ENV=production
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http

      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.rule=Host(`dashboard.${DOMAIN?Variable not set}`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-https.tls.certresolver=le

      # Enable redirection for HTTP and HTTPS
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.middlewares=https-redirect

  streams:
    image: '${DOCKER_IMAGE_STREAMS?Variable not set}:${TAG-latest}'
    restart: always
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      debezium-connector-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      <<: *streams-env
    build:
      context: .
      dockerfile: backend/services/pief-streams/Dockerfile

  kafka:
    image: apache/kafka:3.8.1
    restart: always
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk" # Fixed cluster ID — must not change between restarts
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # Debezium runs as a Kafka Connect worker with the MongoDB connector built in
  debezium-connect:
    image: quay.io/debezium/connect:3.0
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
      mongo-shard-init:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: _debezium-configs
      OFFSET_STORAGE_TOPIC: _debezium-offsets
      STATUS_STORAGE_TOPIC: _debezium-status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  # One-shot: registers (or updates) the MongoDB connector config via the idempotent
  # PUT /connectors/{name}/config endpoint — creates on first run, no-ops thereafter.
  debezium-connector-init:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./config/debezium:/config/debezium:ro
    entrypoint:
      - curl
      - -sf
      - -X
      - PUT
      - http://debezium-connect:8083/connectors/mongodb-elog-connector/config
      - -H
      - "Content-Type: application/json"
      - -d
      - "@/config/debezium/mongodb-connector.json"

volumes:
  app-db-data:
  kafka-data:

networks:
  traefik-public:
    # Allow setting it to false for testing
    external: true
